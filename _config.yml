# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Welcome to Enoch's Blog!
subtitle: ''
description: 一个持续更新的中文学习博客，主要记录 Python、LeetCode、Hexo/Butterfly 博客搭建与技术学习过程。
keywords:
  - Python
  - LeetCode Hot100
  - Hexo
  - Butterfly
  - 博客搭建
  - 学习笔记
author: Enoch
language: zh-CN
timezone: Asia/Shanghai

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://cccignore.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repository: ssh://git@ssh.github.com:443/cccignore/cccignore.github.io.git
  branch: main

hide_posts:
  enable: true
  noindex: true
  allowlist_generators:
    - archive
    - category
    - tag
  blocklist_generators:
    - index
    - feed

# Local search index
search:
  path: search.xml
  field: post
  content: true

feed:
  type: atom
  path: atom.xml
  limit: 20
  content: true
  content_limit: 2000

sitemap:
  path: sitemap.xml
  tags: true
  categories: true

baidusitemap:
  path: baidusitemap.xml

# 看板娘配置
live2d:
  enable: false
  pluginModelPath: assets/
  model:
    use: live2d-widget-model-koharu  # 切换到koharu模型
  display:
    position: right  # 改为右侧显示
    width: 180       # 增大宽度
    height: 350      # 增大高度
    hOffset: 0       # 水平偏移
    vOffset: -20     # 垂直偏移，稍微上移
  mobile:
    show: true       # 移动端也显示
  react:
    opacity: 0.8     # 设置透明度
  dialog:
    enable: true     # 启用对话框
    script:
      - 欢迎来到我的博客！
      - 今天天气不错呢~
      - 一起学习编程吧！  # 手机端不显示
