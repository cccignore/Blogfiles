name: Deploy Hexo Blog to GitHub Pages

on:
  push:
    branches: [ main, master ]  # 当推送到 main 或 master 分支时触发
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史记录
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install Dependencies
      run: |
        npm ci
        npm install hexo-cli -g
        
    - name: Clean and Generate
      run: |
        hexo clean
        hexo generate
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        publish_branch: gh-pages  # 部署到 gh-pages 分支
        force_orphan: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Deploy: ${{ github.event.head_commit.message }}'
        
    - name: Notification
      if: success()
      run: |
        echo "✅ 博客部署成功！"
        echo "🌐 访问地址: https://cccignore.github.io/"
        echo "📝 本次更新: ${{ github.event.head_commit.message }}"